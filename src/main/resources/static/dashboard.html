<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanbanFlow | Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/dashboard.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div>
        <div class="logo">KanbanFlow</div>

        <nav class="menu">
          <a href="#" class="active">📁 Projetos</a>
          <a href="#">📋 Tarefas</a>
          <a href="#">📈 Histórico</a>
          <a href="#">⚙️ Configurações</a>
        </nav>
      </div>

      <button class="logout-btn" id="logoutBtn">Sair da Conta</button>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1>Seus Projetos</h1>
          <p>Organize seus projetos e acompanhe tarefas em tempo real.</p>
        </div>

        <button class="create-project-btn" id="openModalBtn">
          + Novo Projeto
        </button>
      </div>

      <div class="projects-grid" id="projectsGrid"></div>
    </main>

    <div class="modal" id="projectModal">
      <div class="modal-content">
        <h2>Criar Novo Projeto</h2>

        <form id="projectForm">
          <div class="input-group">
            <label>Nome do Projeto</label>
            <input type="text" id="projectNome" required />
          </div>

          <div class="modal-actions">
            <button type="submit" class="save-btn">Criar Projeto</button>

            <button type="button" class="cancel-btn" id="closeModalBtn">
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
  <script src="./js/dashboard.js"></script>
</html>
